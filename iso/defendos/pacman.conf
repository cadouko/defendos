# DefendOS – pacman.conf (intégré au profil archiso)
# Active les dépôts Arch officiel + BlackArch

[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

[blackarch]
Server = https://www.mirrorservice.org/sites/blackarch.org/blackarch/$repo/os/$arch
Server = https://blackarch.org/blackarch/$repo/os/$arch
