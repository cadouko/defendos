name: DefendOS Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_iso:
        description: Build the complete ISO
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint scripts
        run: |
          echo "Linting..."
          find . -name "*.sh" -not -path "./.git/*" -not -path "./build/*" -exec shellcheck --severity=warning {} \; || true

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Test install.sh
        run: bash install.sh --help

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  build-iso-debian:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_iso == 'true'
    needs: [lint, integration]
    steps:
      - uses: actions/checkout@v4
      - name: Build ISO
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y live-build curl git python3
          mkdir -p build/iso
          cd iso/debian
          sudo lb clean --purge 2>/dev/null || true
          sudo bash auto/config
          sudo lb build
        timeout-minutes: 90
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: defendos-debian-iso-${{ github.sha }}
          path: build/iso/
          retention-days: 7
