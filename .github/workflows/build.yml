name: DefendOS Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_iso:
        description: Build the complete ISO
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./build/*" -exec shellcheck --severity=warning {} \; || true
      - name: Python syntax
        run: |
          for f in iso/debian/config/includes.chroot/usr/local/bin/*; do
            python3 -m py_compile "$f" 2>/dev/null || true
          done
      - name: Package list duplicates
        run: |
          DUPES=$(tr -d '\r' < iso/debian/config/package-lists/defendos.list.chroot | grep -v '^#' | grep -v '^$' | sort | uniq -d)
          if [[ -n "$DUPES" ]]; then echo "Duplicates: $DUPES"; exit 1; fi
          echo "No duplicates"
      - name: Kickstart syntax
        run: |
          for s in "%packages" "%post" "%end"; do
            grep -q "$s" iso/fedora/defendos.ks || { echo "Missing: $s"; exit 1; }
          done
      - name: auto/config syntax
        run: bash -n iso/debian/auto/config

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: install.sh --help
        run: bash install.sh --help
      - name: hardening.sh --dry-run (no root)
        run: |
          bash scripts/hardening.sh --dry-run 2>&1 | grep -q "root" && echo "Root check OK" || true
      - name: Module syntax
        run: |
          for f in modules/*.sh scripts/*.sh; do
            bash -n "$f" || { echo "Syntax error in $f"; exit 1; }
          done

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  build-iso-debian:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_iso == 'true'
    needs: [lint, integration]
    steps:
      - uses: actions/checkout@v4
      - name: Install live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y live-build curl git python3 debian-archive-keyring syslinux syslinux-common
          sudo ln -sf /usr/share/keyrings/debian-archive-keyring.gpg /usr/share/keyrings/ubuntu-keyring.gpg
      - name: Patch lb_chroot_linux-image for Bookworm
        run: |
          # Debian Bookworm has per-component Contents files only;
          # lb_chroot_linux-image expects dists/bookworm/Contents-amd64.gz
          # which no longer exists. Disable auto-detection and rely on
          # linux-image-amd64 in the package list.
          SCRIPT=$(find /usr/lib -name "lb_chroot_linux-image" -type f 2>/dev/null | head -1)
          if [ -n "$SCRIPT" ]; then
            sudo cp "$SCRIPT" "${SCRIPT}.bak"
            printf '#!/bin/sh\nexit 0\n' | sudo tee "$SCRIPT"
            echo "Patched $SCRIPT to no-op"
          else
            echo "lb_chroot_linux-image not found, assuming step is already disabled"
          fi
      - name: "Build ISO (stage 1: bootstrap + chroot)"
        run: |
          cd iso/debian
          sudo lb clean --purge 2>/dev/null || true
          sudo bash auto/config
          sudo lb bootstrap
          sudo lb chroot
        timeout-minutes: 90
      - name: Inject isolinux files for binary syslinux stage
        run: |
          cd iso/debian
          # Install isolinux and syslinux-common in the chroot so files exist
          sudo chroot chroot apt-get install -y isolinux syslinux-common 2>/dev/null || true
          # lb_binary_syslinux expects files at /root/isolinux/ on the HOST filesystem
          sudo mkdir -p /root/isolinux
          if [ -f chroot/usr/lib/ISOLINUX/isolinux.bin ]; then
            sudo cp chroot/usr/lib/ISOLINUX/isolinux.bin /root/isolinux/
          fi
          if [ -f chroot/usr/lib/syslinux/modules/bios/vesamenu.c32 ]; then
            sudo cp chroot/usr/lib/syslinux/modules/bios/vesamenu.c32 /root/isolinux/
          fi
          echo "isolinux files prepared:"
          ls -la /root/isolinux/ 2>/dev/null || echo "WARNING: /root/isolinux/ empty"
      - name: "Build ISO (stage 2: binary)"
        run: |
          cd iso/debian
          sudo lb binary
        timeout-minutes: 30
      - name: Checksum ISO
        run: |
          ISO=$(find iso/debian -maxdepth 1 -name "*.iso" | head -1)
          [ -n "$ISO" ] || { echo "No ISO generated"; exit 1; }
          cp "$ISO" build/iso/
          ISO=build/iso/$(basename "$ISO")
          sha256sum "$ISO" > "${ISO}.sha256"
          sha512sum "$ISO" > "${ISO}.sha512"
          cat "${ISO}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: defendos-debian-iso-${{ github.sha }}
          path: |
            build/iso/*.iso
            build/iso/*.sha256
            build/iso/*.sha512
          retention-days: 7
